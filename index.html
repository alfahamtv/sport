<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alfaham TV</title>
    
    <!-- السطر المخفي لتفعيل ميزة التثبيت عبر قائمة المتصفح -->
    <link rel="manifest" href="manifest.json">
    
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    overflow-x: hidden;
}

body {
    font-family: 'Cairo', sans-serif;
    background: url('https://h.top4top.io/p_3784nirj21.png') center / cover no-repeat fixed;
    min-height: 100vh;
    margin: 0;
}

.site-header {
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    z-index: 100000;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    background: rgba(0, 0, 0, 0.78);
    backdrop-filter: blur(14px);
    color: #fff;
}

.site-title {
    font-weight: 700;
    font-size: 18px;
    text-align: center;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    max-width: 60%;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sidebar-toggle,
.nav-item,
.sidebar-close,
.install-btn {
    border: none;
    background: transparent;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
}

.sidebar-toggle {
    font-size: 22px;
    width: 42px;
    height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.install-btn {
    min-width: 88px;
    padding: 8px 12px;
    border: 1px solid rgba(255, 255, 255, 0.32);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    transition: background 0.2s ease, transform 0.2s ease;
}

.install-btn:hover {
    background: rgba(255, 255, 255, 0.18);
    transform: translateY(-1px);
}

.site-logo {
    height: 48px;
    width: auto;
    object-fit: contain;
    display: flex;
    align-items: center;
    justify-content: center;
}

.sidebar-overlay {
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.45);
    z-index: 99998;
    display: none;
}

.toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: transparent;
    color: #ffffff;
    padding: 0;
    border-radius: 0;
    font-weight: 700;
    z-index: 100001;
    box-shadow: none;
    max-width: calc(100% - 32px);
    text-align: center;
    pointer-events: none;
}

.card.message-card {
    background: rgba(255, 255, 255, 0.12);
    color: #ffffff;
    box-shadow: none;
    border: 1px solid rgba(255, 255, 255, 0.08);
}

.hidden {
    display: none !important;
}

.sidebar-overlay.hidden {
    display: none;
}

.sidebar {
    position: fixed;
    top: 64px;
    left: 0;
    height: calc(100vh - 64px);
    width: 280px;
    max-width: 85vw;
    background: rgba(0, 0, 0, 0.98);
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 1000001;
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--primary) transparent;
}

.sidebar::-webkit-scrollbar {
    width: 4px;
}

.sidebar::-webkit-scrollbar-track {
    background: transparent;
}

.sidebar::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
}

.sidebar-open .sidebar {
    transform: translateX(0);
}

.sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

.sidebar-title {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
}

.sidebar-close {
    border: none;
    background: transparent;
    color: #fff;
    font-size: 26px;
    cursor: pointer;
    line-height: 1;
}

.sidebar-open .sidebar-overlay {
    display: block;
}

.sidebar-brand {
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.sidebar-logo {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
}

.sidebar-name {
    font-size: 18px;
    font-weight: 800;
    margin-top: 15px;
    color: var(--primary);
}

.sidebar-section {
    padding: 0 20px 20px;
}

.sidebar-section-title {
    font-size: 12px;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 15px;
    font-weight: 700;
}

.sidebar-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 15px;
    color: #ffffff;
    text-decoration: none;
    border-radius: 12px;
    transition: all 0.3s ease;
    margin-bottom: 5px;
    font-size: 14px;
    font-weight: 700;
}

.sidebar-link i {
    width: 20px;
    text-align: center;
    font-size: 18px;
    color: #ffffff;
    transition: all 0.3s ease;
}

.sidebar-link:hover,
.sidebar-link:active {
    background: rgba(255, 102, 0, 0.15);
    color: #FF6600;
}

.sidebar-link:hover i,
.sidebar-link:active i {
    color: #FF6600;
}

.bottom-nav {
    position: fixed;
    inset: auto 0 0 0;
    z-index: 100000;
    display: flex;
    justify-content: center;
    align-items: stretch;
    height: 64px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    gap: 0;
}

.nav-item {
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0;
    border-radius: 0;
    flex: 1;
    transition: all 0.3s ease;
    height: 100%;
    opacity: 0.6;
    font-weight: 700;
    font-size: 13px;
}

.nav-item.active {
    background: #000000 !important;
    color: #ff8c00 !important;
    opacity: 1;
    font-size: 14px;
}

.nav-item:hover {
    opacity: 0.8;
}

.nav-icon {
    font-size: 18px;
    color: #fff;
}

.content-container {
    width: min(100%, 1400px);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 94px 16px 100px;
    margin: 0 auto;
    overflow-y: auto;
}

.player-open .site-header,
.player-open .bottom-nav,
.player-open .sidebar,
.player-open .sidebar-overlay,
.player-open .content-container {
    display: none !important;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 110px);
    gap: 8px;
    justify-content: center;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
}

.card {
    background-color: rgba(255, 255, 255, 0.92);
    border-radius: 8px;
    width: 110px;
    padding: 6px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.2s ease;
    cursor: pointer;
    border: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 8px;
}

.card-title {
    margin-top: 4px;
    font-size: clamp(11px, 1.5vw, 13px);
    color: #000;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
    text-align: center;
    font-weight: 700;
}

.player-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding-bottom: 72px;
}

.player-container.hidden {
    display: none !important;
}

.matches-table-container,
.external-link-container {
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 0;
    direction: rtl;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 100001;
    background: #000;
}

#matchesIframe,
#externalLinkIframe {
    width: 100%;
    height: 100%;
    background: #fff;
    border: none;
}

.external-link-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    padding: 12px 18px;
    background: rgba(0, 0, 0, 0.92);
    }
    </style>
</head>
<body>
    <!-- تم ترك جسم الصفحة فارغاً كما أرسلته ليكتمل كودك البرمجي الخاص به طبيعياً دون تدخل -->
    
    <!-- كود تسجيل الـ Service Worker في الخلفية دون أي ظهور للمستخدم -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(() => console.log('PWA Ready'))
                .catch(err => console.log('PWA Error', err));
            });
        }
    </script>
</body>
</html>
